<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KSE — Live telemetry</title>
  <style>
    /* VS Code Dark+ palette. */
    :root { color-scheme: dark; }
    body { margin: 0; font-family: Consolas, "Cascadia Mono", monospace; background: #1e1e1e; color: #d4d4d4; }
    header { display: flex; gap: 8px; align-items: center; padding: 10px 14px; background: #252526; border-bottom: 1px solid #333333; position: sticky; top: 0; z-index: 3; }
    header input { flex: 1; min-width: 0; padding: 6px 8px; background: #3c3c3c; color: #d4d4d4; border: 1px solid #333333; border-radius: 4px; font: inherit; }
    header button { padding: 6px 14px; background: #0e639c; color: #fff; border: 0; border-radius: 4px; cursor: pointer; font: inherit; }
    header button.stop { background: #a1260d; }
    #status { font-size: 12px; opacity: .75; white-space: nowrap; }
    #log { padding: 8px 14px; }
    .row { display: grid; grid-template-columns: 88px 56px 150px 1fr; gap: 10px; padding: 2px 0; white-space: pre-wrap; word-break: break-word; border-bottom: 1px solid #2a2a2a; }
    .ts { color: #808080; }
    .msg { color: #d4d4d4; }
    /* Message value tokens — mimics Serilog's console theme over the rendered text. */
    .tok-num { color: #b5cea8; }  /* numbers / money / percent (VS Code number) */
    .tok-str { color: #ce9178; }  /* quoted strings (VS Code string) */
    .tok-sym { color: #4ec9b0; }  /* tickers / currency codes (VS Code type) */
    /* Log level — VS Code editor severities. */
    .lvl-Information { color: #808080; }
    .lvl-Warning { color: #cca700; }
    .lvl-Error, .lvl-Fatal { color: #f44747; }
    /* One VS Code token color per telemetry category. */
    .cat-BotStats { color: #4ec9b0; }
    .cat-Economy { color: #dcdcaa; }
    .cat-Sentiment { color: #c586c0; }
    .cat-Scaler { color: #569cd6; }
    .cat-User { color: #9cdcfe; }
    .cat-Other { color: #ce9178; }
    .cat-FxRate { color: #4fc1ff; }
    .cat-ReservationAuditor { color: #f44747; }
    /* Aggregated (timebucketed) rows get a left accent so a summed window is visually distinct. */
    .row.agg { border-left: 2px solid #444; padding-left: 6px; }
    .row.agg .ts { font-style: italic; }
    /* Filter + timeframe bars. */
    .bar { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; padding: 6px 14px; background: #252526; border-bottom: 1px solid #333333; position: sticky; z-index: 2; }
    #filters { top: 49px; }
    #timeframe { top: 86px; }
    .bar .blabel { font-size: 12px; opacity: .6; margin-right: 4px; }
    .chip { font: inherit; font-size: 12px; padding: 2px 10px; background: #3c3c3c; border: 1px solid #3c3c3c; border-radius: 11px; cursor: pointer; }
    .chip::before { content: "\25CF"; margin-right: 5px; }
    .chip.off { opacity: .4; text-decoration: line-through; }
    /* Timeframe buttons (radio-style: one active). */
    .tf { font: inherit; font-size: 12px; padding: 2px 12px; background: #3c3c3c; color: #d4d4d4; border: 1px solid #3c3c3c; border-radius: 4px; cursor: pointer; }
    .tf.active { background: #0e639c; border-color: #0e639c; color: #fff; }
    #shown { font-size: 12px; opacity: .5; margin-left: auto; }
  </style>
</head>
<body>
  <header>
    <input id="token" type="password" placeholder="Paste admin JWT (sent only in a POST header, never in the URL)" />
    <button id="connect">Connect</button>
    <span id="status">idle</span>
  </header>
  <div id="filters" class="bar"><span class="blabel">Categories:</span></div>
  <div id="timeframe" class="bar"><span class="blabel">Timeframe:</span></div>
  <div id="log"></div>

  <script>
    const tokenInput = document.getElementById('token');
    const connectBtn = document.getElementById('connect');
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const shownEl = document.createElement('span'); shownEl.id = 'shown';  // a counter appended into the timeframe bar
    let source = null;
    let retry = 1000;

    // Show timestamps in the viewer's local time zone; if the browser can't resolve one,
    // fall back to Amsterdam rather than drifting to UTC.
    const TZ = (() => {
      try { return Intl.DateTimeFormat().resolvedOptions().timeZone || 'Europe/Amsterdam'; }
      catch { return 'Europe/Amsterdam'; }
    })();

    // Viewer categories (key matches evt.category and the .cat-* color); label is the chip text.
    const CATEGORIES = [
      ['BotStats', 'BotStats'],
      ['Economy', 'Economy'],
      ['Sentiment', 'Sentiment'],
      ['Scaler', 'Scaler'],
      ['FxRate', 'FxRate'],   // FX rate walk + FX-desk session line
      ['User', 'User'],
      ['Other', 'Other'],     // ReservationAuditor (infrequent)
    ];
    const CAT_LABEL = Object.fromEntries(CATEGORIES);
    // Categories the timeframe selector collapses to one row per bucket. BotStats SUMS its per-window
    // flow metrics into a bigger window; the others are snapshots/levels (Economy wealth, Sentiment,
    // Scaler cap, FxRate cumulative session) so the bucket keeps the LATEST line. Event-driven
    // categories (User, Other) are never collapsed — every discrete line shows.
    const BUCKETABLE = new Set(['BotStats', 'Economy', 'Sentiment', 'Scaler', 'FxRate']);
    const SUM_AGGREGATE = new Set(['BotStats']); // true summation; the rest = latest-in-bucket
    const TIMEFRAMES = [['1m', 60], ['5m', 300], ['15m', 900], ['1h', 3600]];

    const MAX_SHOWN = 200;        // rows rendered
    const MAX_BUFFER = 12000;     // events held client-side (server keeps 24h/category)

    const enabled = new Set(CATEGORIES.map(c => c[0]));  // all on by default
    let timeframeSec = 60;                                // 1m default
    let events = [];                                      // chronological ascending (backfill then live)

    // --- category chips (default on) ---
    const filtersEl = document.getElementById('filters');
    for (const [cat, label] of CATEGORIES) {
      const chip = document.createElement('button');
      chip.className = 'chip cat-' + cat;
      chip.dataset.cat = cat;
      chip.textContent = label;
      chip.title = cat;
      chip.addEventListener('click', () => {
        if (enabled.delete(cat)) chip.classList.add('off');
        else { enabled.add(cat); chip.classList.remove('off'); }
        render();
      });
      filtersEl.appendChild(chip);
    }

    // --- timeframe selector (radio-style) ---
    const tfEl = document.getElementById('timeframe');
    const tfButtons = [];
    for (const [label, secs] of TIMEFRAMES) {
      const b = document.createElement('button');
      b.className = 'tf' + (secs === timeframeSec ? ' active' : '');
      b.textContent = label;
      b.addEventListener('click', () => {
        timeframeSec = secs;
        for (const x of tfButtons) x.classList.toggle('active', x === b);
        render();
      });
      tfButtons.push(b);
      tfEl.appendChild(b);
    }
    shownEl.textContent = '';
    tfEl.appendChild(shownEl);

    // Persist the token across reloads so a phone stays connected after a sleep.
    tokenInput.value = localStorage.getItem('kse_admin_token') || '';
    function setStatus(text) { statusEl.textContent = text; }

    // Re-color the rendered message the way Serilog's console theme did.
    const TOKEN_RE = /("[^"]*")|(-?\$[\d,]+(?:\.\d+)?)|([+-]?\d[\d,]*(?:\.\d+)?\s*%)|(\b[A-Z]{2,6}(?:\/[A-Z]{2,6})?\b)|([+-]?\d[\d,]*(?:\.\d+)?)/g;
    function escapeHtml(s) { return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }
    function highlight(message) {
      return escapeHtml(message).replace(TOKEN_RE, (m, str, money, pct, sym, num) => {
        if (str) return `<span class="tok-str">${m}</span>`;
        if (sym) return `<span class="tok-sym">${m}</span>`;
        return `<span class="tok-num">${m}</span>`;
      });
    }

    function rowEl(e, agg) {
      const row = document.createElement('div');
      row.className = agg ? 'row agg' : 'row';
      const ts = new Date(e.timestamp).toLocaleTimeString(undefined, { timeZone: TZ, hour12: false });
      row.innerHTML =
        `<span class="ts">${ts}</span>` +
        `<span class="lvl-${e.level}">${e.level.slice(0, 3).toUpperCase()}</span>` +
        `<span class="cat-${e.category}"></span>` +
        `<span class="msg"></span>`;
      row.querySelector(`.cat-${e.category}`).textContent = CAT_LABEL[e.category] || e.category;
      row.querySelector('.msg').innerHTML = highlight(e.message);
      return row;
    }

    // Sum BotStats' per-window FLOW metrics across a bucket into one bigger window. Levels (bots X/Y)
    // take the latest. Parsed from the rendered line; if a field is absent it contributes 0 (graceful).
    function aggregateBotStats(arr, bucketMin) {
      const num = s => s == null ? 0 : parseFloat(String(s).replace(/,/g, '')) || 0;
      const grab = (m, re) => { const x = m.match(re); return x ? x[1] : null; };
      let trades = 0, buy = 0, sell = 0, lim = 0, slip = 0, tru = 0, canc = 0, vol = 0, online = '?', loaded = '?';
      for (const e of arr) {
        const m = e.message;
        const b = m.match(/bots\s+([\d,]+)\/([\d,]+)/); if (b) { online = b[1]; loaded = b[2]; }
        trades += num(grab(m, /trades\s+([\d,]+)/));
        buy    += num(grab(m, /buy\s+([\d,]+)/));
        sell   += num(grab(m, /sell\s+([\d,]+)/));
        lim    += num(grab(m, /Limit\s+([\d,]+)/));
        slip   += num(grab(m, /SlipMarket\s+([\d,]+)/));
        tru    += num(grab(m, /TrueMarket\s+([\d,]+)/));
        canc   += num(grab(m, /cancelled\s+([\d,]+)/));
        vol    += num(grab(m, /volume\s+\$?([\d,]+(?:\.\d+)?)/));
      }
      const f = n => Math.round(n).toLocaleString('en-US');
      const last = arr[arr.length - 1];
      const msg = `BotStats[${bucketMin}m ×${arr.length}] bots ${online}/${loaded}, trades ${f(trades)} ` +
        `(buy ${f(buy)}/sell ${f(sell)}), type (Limit ${f(lim)}/SlipMarket ${f(slip)}/TrueMarket ${f(tru)}), ` +
        `cancelled ${f(canc)}, volume $${vol.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
      return { timestamp: last.timestamp, level: last.level, source: last.source, category: 'BotStats', message: msg };
    }

    // Build the visible set: filter by enabled category; for a >1m timeframe, collapse each BUCKETABLE
    // category to one row per bucket — BotStats by SUMMING its flows, the rest by keeping the LATEST
    // snapshot. Event-driven categories pass through. Newest-first, capped at MAX_SHOWN.
    function render() {
      const tf = timeframeSec;
      const bucketMin = tf / 60;
      const kept = [];                 // { evt, agg } OR { sumKey, agg:true } placeholder
      const sumGroups = new Map();     // "cat|bucket" -> [events]   (SUM_AGGREGATE)
      const latestIdx = new Map();     // "cat|bucket" -> index in kept (latest-wins)
      for (const e of events) {        // events ascending, so later overwrites earlier
        if (!enabled.has(e.category)) continue;
        if (tf > 60 && BUCKETABLE.has(e.category)) {
          const key = e.category + '|' + Math.floor(new Date(e.timestamp).getTime() / 1000 / tf);
          if (SUM_AGGREGATE.has(e.category)) {
            let arr = sumGroups.get(key);
            if (!arr) { arr = []; sumGroups.set(key, arr); kept.push({ sumKey: key, agg: true }); }
            arr.push(e);
          } else {
            const at = latestIdx.get(key);
            if (at !== undefined) kept[at] = { evt: e, agg: true };
            else { latestIdx.set(key, kept.length); kept.push({ evt: e, agg: true }); }
          }
        } else {
          kept.push({ evt: e, agg: false });
        }
      }
      const resolved = kept.map(k => k.evt ? k : { evt: aggregateBotStats(sumGroups.get(k.sumKey), bucketMin), agg: true });
      resolved.sort((a, b) => new Date(b.evt.timestamp) - new Date(a.evt.timestamp)); // newest first
      const show = resolved.slice(0, MAX_SHOWN);
      const frag = document.createDocumentFragment();
      for (const r of show) frag.appendChild(rowEl(r.evt, r.agg));
      logEl.replaceChildren(frag);
      shownEl.textContent = `${show.length}/${resolved.length} shown` + (tf > 60 ? ` · ${bucketMin}m buckets` : '');
    }

    // Coalesce the burst of backfill events into one render.
    let renderQueued = false;
    function scheduleRender() {
      if (renderQueued) return;
      renderQueued = true;
      setTimeout(() => { renderQueued = false; render(); }, 80);
    }

    function ingest(e) {
      events.push(e);
      if (events.length > MAX_BUFFER) events.splice(0, events.length - MAX_BUFFER);
      scheduleRender();
    }

    let wantConnected = false;

    async function openStream() {
      const token = tokenInput.value.trim();
      const res = await fetch('/api/admin/logs/ticket', { method: 'POST', headers: { Authorization: 'Bearer ' + token } });
      if (!res.ok) { setStatus('auth failed (check token / admin role)'); wantConnected = false; return; }
      const { ticket } = await res.json();

      source = new EventSource('/api/admin/logs/stream?ticket=' + encodeURIComponent(ticket));
      source.onopen = () => { setStatus('connected'); retry = 1000; };
      source.onmessage = e => { try { ingest(JSON.parse(e.data)); } catch {} };
      source.onerror = () => {
        if (source) { source.close(); source = null; }
        if (!wantConnected) return;
        setStatus('reconnecting…');
        retry = Math.min(retry * 2, 15000);
        setTimeout(() => { if (wantConnected) openStream(); }, retry);
      };
    }

    function connect() {
      const token = tokenInput.value.trim();
      if (!token) { setStatus('enter a token'); return; }
      localStorage.setItem('kse_admin_token', token);
      disconnect();
      events = [];               // fresh backfill on each connect
      render();
      wantConnected = true;
      retry = 1000;
      setStatus('connecting…');
      openStream();
      connectBtn.textContent = 'Disconnect';
      connectBtn.classList.add('stop');
    }

    function disconnect() {
      wantConnected = false;
      if (source) { source.close(); source = null; }
      connectBtn.textContent = 'Connect';
      connectBtn.classList.remove('stop');
    }

    connectBtn.addEventListener('click', () => (source || wantConnected ? (disconnect(), setStatus('idle')) : connect()));
  </script>
</body>
</html>
