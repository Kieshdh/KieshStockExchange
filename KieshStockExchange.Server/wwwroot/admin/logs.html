<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KSE — Live telemetry</title>
  <style>
    /* VS Code Dark+ palette. */
    :root { color-scheme: dark; }
    body { margin: 0; font-family: Consolas, "Cascadia Mono", monospace; background: #1e1e1e; color: #d4d4d4; }
    header { display: flex; gap: 8px; align-items: center; padding: 10px 14px; background: #252526; border-bottom: 1px solid #333333; position: sticky; top: 0; }
    header input { flex: 1; min-width: 0; padding: 6px 8px; background: #3c3c3c; color: #d4d4d4; border: 1px solid #333333; border-radius: 4px; font: inherit; }
    header button { padding: 6px 14px; background: #0e639c; color: #fff; border: 0; border-radius: 4px; cursor: pointer; font: inherit; }
    header button.stop { background: #a1260d; }
    #status { font-size: 12px; opacity: .75; white-space: nowrap; }
    #log { padding: 8px 14px; }
    .row { display: grid; grid-template-columns: 88px 56px 160px 1fr; gap: 10px; padding: 2px 0; white-space: pre-wrap; word-break: break-word; border-bottom: 1px solid #2a2a2a; }
    .ts { color: #808080; }
    .msg { color: #d4d4d4; }
    /* Message value tokens — mimics Serilog's console theme over the rendered text. */
    .tok-num { color: #b5cea8; }  /* numbers / money / percent (VS Code number) */
    .tok-str { color: #ce9178; }  /* quoted strings (VS Code string) */
    .tok-sym { color: #4ec9b0; }  /* tickers / currency codes (VS Code type) */
    /* Log level — VS Code editor severities. */
    .lvl-Information { color: #808080; }
    .lvl-Warning { color: #cca700; }
    .lvl-Error, .lvl-Fatal { color: #f44747; }
    /* One VS Code token color per telemetry source. */
    .src-BotStatsLogger { color: #4ec9b0; }      /* teal (type) */
    .src-BotEconomyTelemetry { color: #dcdcaa; }  /* yellow (function) */
    .src-BotSentimentService { color: #c586c0; }  /* purple (control) */
    .src-BotScalerService { color: #569cd6; }     /* blue (keyword) */
    .src-FxRateService { color: #ce9178; }        /* orange (string) */
    .src-ReservationAuditor { color: #9cdcfe; }   /* light blue (variable) */
    /* Per-source filter bar. Each chip inherits its source color (text + dot); a
       disabled source is dimmed + struck through and its rows are hidden client-side. */
    #filters { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; padding: 6px 14px; background: #252526; border-bottom: 1px solid #333333; position: sticky; top: 49px; }
    #filters .flabel { font-size: 12px; opacity: .6; margin-right: 2px; }
    .chip { font: inherit; font-size: 12px; padding: 2px 10px; background: #3c3c3c; border: 1px solid #3c3c3c; border-radius: 11px; cursor: pointer; }
    .chip::before { content: "\25CF"; margin-right: 5px; }
    .chip.off { opacity: .4; text-decoration: line-through; }
  </style>
</head>
<body>
  <header>
    <input id="token" type="password" placeholder="Paste admin JWT (sent only in a POST header, never in the URL)" />
    <button id="connect">Connect</button>
    <span id="status">idle</span>
  </header>
  <div id="filters"><span class="flabel">Sources:</span></div>
  <div id="log"></div>

  <script>
    const tokenInput = document.getElementById('token');
    const connectBtn = document.getElementById('connect');
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    let source = null;
    let retry = 1000;

    // Show timestamps in the viewer's local time zone; if the browser can't resolve one,
    // fall back to Amsterdam rather than drifting to UTC.
    const TZ = (() => {
      try { return Intl.DateTimeFormat().resolvedOptions().timeZone || 'Europe/Amsterdam'; }
      catch { return 'Europe/Amsterdam'; }
    })();

    // Per-source filter. The six telemetry sources the server's sink emits; the
    // label is a short display name, the key matches evt.source (and the .src-* color).
    const SOURCES = [
      ['BotStatsLogger', 'BotStats'],
      ['BotEconomyTelemetry', 'Economy'],
      ['BotSentimentService', 'Sentiment'],
      ['BotScalerService', 'Scaler'],
      ['FxRateService', 'FX'],
      ['ReservationAuditor', 'ReservationAuditor'],
    ];
    const SOURCE_LABEL = Object.fromEntries(SOURCES);  // source key -> short display name
    const disabled = new Set();          // sources the user has toggled off
    const filtersEl = document.getElementById('filters');
    for (const [src, label] of SOURCES) {
      const chip = document.createElement('button');
      chip.className = 'chip src-' + src;
      chip.dataset.src = src;
      chip.textContent = label;
      chip.title = src;
      chip.addEventListener('click', () => {
        if (disabled.delete(src)) chip.classList.remove('off');
        else { disabled.add(src); chip.classList.add('off'); }
        // Re-apply to rows already on screen so the toggle is retroactive.
        logEl.querySelectorAll('.row').forEach(r => {
          if (r.dataset.src === src) r.style.display = disabled.has(src) ? 'none' : '';
        });
      });
      filtersEl.appendChild(chip);
    }

    // Persist the token across reloads so a phone stays connected after a sleep.
    tokenInput.value = localStorage.getItem('kse_admin_token') || '';

    function setStatus(text) { statusEl.textContent = text; }

    // Re-color the rendered message the way Serilog's console theme did: the
    // structured values (numbers, money, percentages, quoted strings, ticker /
    // currency symbols) stand out from the literal label text. Quoted strings
    // come first so money/timestamps inside quotes aren't split.
    const TOKEN_RE = /("[^"]*")|(-?\$[\d,]+(?:\.\d+)?)|([+-]?\d[\d,]*(?:\.\d+)?\s*%)|(\b[A-Z]{2,6}(?:\/[A-Z]{2,6})?\b)|([+-]?\d[\d,]*(?:\.\d+)?)/g;

    function escapeHtml(s) {
      return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    }

    function highlight(message) {
      return escapeHtml(message).replace(TOKEN_RE, (m, str, money, pct, sym, num) => {
        if (str) return `<span class="tok-str">${m}</span>`;
        if (sym) return `<span class="tok-sym">${m}</span>`;
        return `<span class="tok-num">${m}</span>`; // money / pct / num
      });
    }

    function append(evt) {
      const row = document.createElement('div');
      row.className = 'row';
      row.dataset.src = evt.source;
      if (disabled.has(evt.source)) row.style.display = 'none';
      const ts = new Date(evt.timestamp).toLocaleTimeString(undefined, { timeZone: TZ, hour12: false });
      row.innerHTML =
        `<span class="ts">${ts}</span>` +
        `<span class="lvl-${evt.level}">${evt.level.slice(0, 3).toUpperCase()}</span>` +
        `<span class="src src-${evt.source}"></span>` +
        `<span class="msg"></span>`;
      row.querySelector('.src').textContent = SOURCE_LABEL[evt.source] || evt.source;
      row.querySelector('.msg').innerHTML = highlight(evt.message);
      logEl.appendChild(row);
      // Cap the DOM at 500 rows so a long session doesn't bloat memory.
      while (logEl.childElementCount > 500) logEl.removeChild(logEl.firstChild);
      window.scrollTo(0, document.body.scrollHeight);
    }

    let wantConnected = false;

    // Mint a single-use ticket with the JWT in the POST header (never the URL),
    // then open the stream with only that ticket. Tickets are single-use, so a
    // dropped stream is re-minted here rather than relying on EventSource's
    // built-in reconnect (which would replay the already-consumed ticket).
    async function openStream() {
      const token = tokenInput.value.trim();
      const res = await fetch('/api/admin/logs/ticket', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token },
      });
      if (!res.ok) { setStatus('auth failed (check token / admin role)'); wantConnected = false; return; }
      const { ticket } = await res.json();

      source = new EventSource('/api/admin/logs/stream?ticket=' + encodeURIComponent(ticket));
      source.onopen = () => { setStatus('connected'); retry = 1000; };
      source.onmessage = e => { try { append(JSON.parse(e.data)); } catch {} };
      source.onerror = () => {
        if (source) { source.close(); source = null; }
        if (!wantConnected) return;
        setStatus('reconnecting…');
        retry = Math.min(retry * 2, 15000);
        setTimeout(() => { if (wantConnected) openStream(); }, retry);
      };
    }

    function connect() {
      const token = tokenInput.value.trim();
      if (!token) { setStatus('enter a token'); return; }
      localStorage.setItem('kse_admin_token', token);
      disconnect();
      wantConnected = true;
      retry = 1000;
      setStatus('connecting…');
      openStream();
      connectBtn.textContent = 'Disconnect';
      connectBtn.classList.add('stop');
    }

    function disconnect() {
      wantConnected = false;
      if (source) { source.close(); source = null; }
      connectBtn.textContent = 'Connect';
      connectBtn.classList.remove('stop');
    }

    connectBtn.addEventListener('click', () => (source || wantConnected ? (disconnect(), setStatus('idle')) : connect()));
  </script>
</body>
</html>
