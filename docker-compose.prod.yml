# 7e — production override, applied on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production <cmd>
#
# Two prod-only concerns live here so local dev keeps its conveniences:
#   1. Postgres is NOT published to the host — on a public VM the base file's
#      "5432:5432" would expose the DB to the internet. The server reaches
#      Postgres over the compose network by service name, so no publish is needed.
#   2. A one-shot `migrate` service runs EF Core migrations. The runtime image is
#      deliberately EF-free (data access is raw SQL), so migrations run from the
#      SDK `build` stage via the existing design-time factory (KseDbContextFactory,
#      which reads KSE_DB_CONNECTION_STRING). It is behind a profile so a normal
#      `up` never starts it; run it explicitly once before the first seeded boot:
#        docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#          --env-file .env.production run --rm migrate
services:
  postgres:
    # Clear the base file's published port. Compose *concatenates* list fields
    # across override files, so a plain "ports: []" would NOT drop the inherited
    # "5432:5432" — the !reset tag (Compose >= 2.24) is required to actually
    # remove it. The server still reaches Postgres over the compose network.
    ports: !reset []

  migrate:
    build:
      context: .
      dockerfile: KieshStockExchange.Server/Dockerfile
      target: build
    profiles: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KSE_DB_CONNECTION_STRING: ${KSE_DB_CONNECTION_STRING}
    command:
      - sh
      - -c
      - |
        dotnet tool install --global dotnet-ef --version 9.* && \
        PATH="$$PATH:/root/.dotnet/tools" dotnet ef database update \
          --project KieshStockExchange.Server \
          --startup-project KieshStockExchange.Server

  server:
    # Prod-only Bots config, applied as env overrides (reversible, no schema).
    # These reflect the LIVE prod deployment; rolling one back = delete its line
    # (or restore a docker-compose.prod.yml.pre-* backup) + `up -d server`.
    environment:
      # Fear/Greed per-strategy reaction system (Stage A+B, live since 2026-07-14).
      Bots__Mood__Enabled: "true"
      Bots__Mood__TakerCoupling: "true"
      Bots__Mood__ConvictionFearBid: "true"
      Bots__Mood__PerStrategy: "true"
      Bots__Mood__MMWiden: "true"
      # Random-walk main driver: softer medium-term reversion so moves stick (2026-07-16).
      Bots__RecentAnchor__Strength: "0.05"
      # More random-walk character (2026-07-16): halve the per-stock persistent trend (RegimeDrift
      # 1.0→0.5 = choppier, less smooth trend) + 10% less taker flow (MarketProbMult 1.5→1.35 =
      # calmer, deeper book, smaller moves). Both reversible env; delete a line to roll back.
      Bots__Sentiment__RegimeDrift__Strength: "0.5"
      Bots__MarketProbMult: "1.35"
      # NEWS system — 3-tier jump-diffusion + variable-permanence coupling (2026-07-16).
      # Individual (per-stock, dominant) + global tier; MeanIntervalMinutes=60 is a MODERATE
      # review frequency (per-stock ~hourly) so events are catchable — a 1-line dial, tune to taste.
      Bots__ExogShock__Enabled: "true"
      Bots__ExogShock__MeanIntervalMinutes: "60"
      Bots__ExogShock__DecayHalfLifeSec: "600"
      Bots__ExogShock__MinMagnitude: "0.01"
      Bots__ExogShock__MaxMagnitude: "0.12"
      Bots__ExogShock__MagnitudeExponent: "2.5"
      Bots__ExogShock__Cap: "0.25"
      Bots__ExogShock__AnchorTracksShock: "true"
      Bots__ExogShock__ChaserFraction: "0.10"
      Bots__ExogShock__ChaserNotionalFrac: "0.06"
      Bots__ExogShock__ChaserMaxNotionalFrac: "0.10"
      Bots__ExogShock__ChaserMinIntervalSec: "120"
      Bots__ExogShock__GlobalFraction: "0.25"
      Bots__ExogShock__GlobalCoFire: "true"
      Bots__ExogShock__GlobalCoFireFraction: "0.15"
      Bots__ExogShock__GlobalCoFireNotionalFrac: "0.1"
      # Variable-permanence coupling (docs/NEWS_PERMANENCE_COUPLING.md); rest = appsettings defaults.
      Bots__ExogShock__Permanence__Enabled: "true"
